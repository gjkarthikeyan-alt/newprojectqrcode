<!DOCTYPE html>
<html>
<head>
<title>Geo WhatsApp Redirect</title>
<script>
function sendLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;

            var now = new Date();
            var timestamp = now.toLocaleString();

            var text = "⚠️GAIL(India)Ltd\nHigh pressure Natural gas Pipeline For any gas leakage\nFire or Before Digging Contact GAIL\nಹೆಚ್ಚಿನ ಒತ್ತಡದ ನೈಸರ್ಗಿಕ ಅನಿಲ ಪೈಪ್‌ಲೈನ್ ಯಾವುದೇ ಅನಿಲ ಸೋರಿಕೆ\nಬೆಂಕಿಗಾಗಿ ಅಥವಾ ಅಗೆಯುವ ಮೊದಲು ಗೈಯಿಲ್ ಅವರನ್ನು ಸಂಪರ್ಕಿಸಿ\nPh.9886999156\nLocation: https://maps.google.com/?q=" + lat + "," + lon + "\nTime: " + timestamp;

            var url = "https://wa.me/917904953495?text=" + encodeURIComponent(text);
            window.location.href = url;
        });
    } else {
        alert("Geolocation not supported");
    }
}
</script>
</head>
<body onload="sendLocation()">
<p>Fetching location... Please allow permission.</p>
</body>
</html>
